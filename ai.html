<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riddle Generator</title>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      background:#0f3460;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 560px;
      width: 100%;
      color: #e0e0e0;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #e2b96f;
      letter-spacing: 1px;
      margin-bottom: 0.25rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: #8899aa;
      margin-bottom: 2rem;
      font-style: italic;
    }

    #riddle-box {
      background: #0f3460;
      border-radius: 12px;
      padding: 1.5rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 1.15rem;
      line-height: 1.7;
      color: #f0f0f0;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    #riddle-box.visible { display: flex; }

    #answer-section { display: none; }
    #answer-section.visible { display: block; }

    .tries-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .try-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e2b96f;
      transition: background 0.3s;
    }

    .try-dot.used { background: #e05c5c; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #f0f0f0;
      font-size: 1rem;
      font-family: Georgia, serif;
      outline: none;
    }

    input[type="text"]:focus { border-color: #e2b96f; }

    button {
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-family: Georgia, serif;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #e2b96f;
      color: #1a1a2e;
      font-weight: bold;
      width: 100%;
      padding: 0.8rem;
    }

    .btn-submit {
      background: #0f3460;
      color: #e2b96f;
      border: 1px solid #e2b96f;
    }

    .btn-hint {
      background: #0f3460;
      color: #e2b96f;
      border: 1px solid #e2b96f;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
    }

    button:hover { opacity: 0.85; }

    #message {
      min-height: 1.4rem;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
      font-style: italic;
    }

    .msg-wrong  { color: #e05c5c; }
    .msg-right  { color: #6fcf97; }
    .msg-reveal { color: #e2b96f; }
    .msg-hint   { color: #aabbcc; }

    #reveal-box {
      display: none;
      background: #0f3460;
      border: 1px solid #e2b96f;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #e2b96f;
      font-size: 1.05rem;
    }

    #reveal-box.visible { display: block; }

    .hint-label {
      font-size: 0.78rem;
      color: #8899aa;
      margin-bottom: 0.5rem;
    }

    #generate-btn { margin-top: 0.5rem; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.3s ease; }
    /* --- MYSTERIOUS BORDER START --- */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      /* Creates a dark fog coming in from the edges */
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none; /* Allows you to still click buttons */
      z-index: 5;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 20px; /* Distance from the screen edge */
      border: 2px solid #e2b96f; /* Magical gold color */
      /* This makes the gold line fade out in the middle of each side */
      mask-image: linear-gradient(to bottom, black, transparent 20%, transparent 80%, black),
                  linear-gradient(to right, black, transparent 20%, transparent 80%, black);
      mask-composite: intersect;
      -webkit-mask-composite: source-in; /* For Chrome/Safari compatibility */
      pointer-events: none;
      opacity: 0.5;
      z-index: 6;
    }

    .card {
      position: relative;
      z-index: 10; /* Ensures the game stays on top of the shadows */
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(226, 185, 111, 0.1);
    }
    /* --- MYSTERIOUS BORDER END --- */
  </style>
</head>
<body>
<div class="card">
  <h1>&#x1F9D9; Riddle Me This...</h1>
  <p class="tagline">Can you crack the mystery?</p>

  <div id="riddle-box"></div>

  <div id="answer-section">
    <div class="tries-bar" id="tries-bar"></div>
    <div id="message"></div>
    <div id="reveal-box"></div>

    <div class="input-row" id="input-row">
      <input type="text" id="answer-input" placeholder="Your answer..." autocomplete="off" />
      <button class="btn-submit" onclick="checkAnswer()">Submit</button>
    </div>

    <div class="hint-label" id="hint-label"></div>
    <button class="btn-hint" id="hint-btn" onclick="showHint()" style="display:none;">Show a hint</button>
  </div>

  <button class="btn-primary" id="generate-btn" onclick="generateRiddle()">&#x2728; Generate a Riddle</button>
</div>

<script>
const riddles = [
  {
    q: "I speak without a mouth and hear without ears. I have no body, but I come alive with the wind. What am I?",
    a: "echo",
    hint: "You hear me in mountains and canyons."
  },
  {
    q: "The more you take, the more you leave behind. What am I?",
    a: "footsteps",
    hint: "Think about walking across sand or snow."
  },
  {
    q: "I have cities, but no houses live there. I have mountains, but no trees grow. I have water, but no fish swim. I have roads, but no cars drive. What am I?",
    a: "map",
    hint: "You might use me to find your way."
  },
  {
    q: "What has hands but can't clap?",
    a: "clock",
    hint: "It tells you something important every day."
  },
  {
    q: "I am always in front of you but cannot be seen. What am I?",
    a: "future",
    hint: "It hasn't happened yet."
  },
  {
    q: "What gets wetter as it dries?",
    a: "towel",
    hint: "You use it after a shower."
  },
  {
    q: "I have a head and a tail, but no body. What am I?",
    a: "coin",
    hint: "You might flip me to make a decision."
  },
  {
    q: "What can travel around the world while staying in a corner?",
    a: "stamp",
    hint: "You put me on an envelope."
  },
  {
    q: "The more there is of it, the less you see. What is it?",
    a: "darkness",
    hint: "It appears when the lights go out."
  },
  {
    q: "I have branches, but no fruit, trunk, or leaves. What am I?",
    a: "bank",
    hint: "You might keep your money here."
  },
  {
    q: "What has one eye but cannot see?",
    a: "needle",
    hint: "It is used for sewing."
  },
  {
    q: "I'm light as a feather, yet the strongest man can't hold me for more than five minutes. What am I?",
    a: "breath",
    hint: "You do it automatically to stay alive."
  },
  {
    q: "What runs but never walks, has a mouth but never talks, has a head but never weeps, has a bed but never sleeps?",
    a: "river",
    hint: "It flows through the land."
  },
  {
    q: "I go up but never come down. What am I?",
    a: "age",
    hint: "Everyone has it, and it only grows."
  },
  {
    q: "What has many teeth but cannot bite?",
    a: "comb",
    hint: "You use it to tidy your hair."
  },
  {
    q: "What can you break, even if you never pick it up or touch it?",
    a: "silence",
    hint: "A sudden sound can do this."
  },
  {
    q: "I am full of holes yet I can hold water. What am I?",
    a: "sponge",
    hint: "You might use me to clean dishes."
  },
  {
    q: "What has words but never speaks?",
    a: "book",
    hint: "You read it for stories and knowledge."
  },
  {
    q: "What begins with T, ends with T, and has T in it?",
    a: "teapot",
    hint: "It holds a hot drink."
  },
  {
    q: "I shrink every time you use me. What am I?",
    a: "soap",
    hint: "You use me to get clean."
  }
];

let current = null;
let triesLeft = 5;
let hintUsed = false;
let gameOver = false;
let usedIndices = [];

function generateRiddle() {
  if (usedIndices.length === riddles.length) usedIndices = [];

  let idx;
  do { idx = Math.floor(Math.random() * riddles.length); }
  while (usedIndices.includes(idx));
  usedIndices.push(idx);

  current = riddles[idx];
  triesLeft = 5;
  hintUsed = false;
  gameOver = false;

  document.getElementById('riddle-box').textContent = current.q;
  document.getElementById('riddle-box').classList.add('visible');
  document.getElementById('answer-section').classList.add('visible');
  document.getElementById('answer-input').value = '';
  document.getElementById('message').textContent = '';
  document.getElementById('message').className = '';
  document.getElementById('reveal-box').classList.remove('visible');
  document.getElementById('input-row').style.display = 'flex';
  document.getElementById('hint-btn').style.display = 'inline-block';
  document.getElementById('hint-label').textContent = '';
  document.getElementById('generate-btn').textContent = '↺ New Riddle';
  document.getElementById('answer-input').focus();

  buildDots();
}

function buildDots() {
  const bar = document.getElementById('tries-bar');
  bar.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'try-dot' + (i >= triesLeft ? ' used' : '');
    bar.appendChild(d);
  }
}

function checkAnswer() {
  if (gameOver) return;
  const input = document.getElementById('answer-input');
  const guess = input.value.trim().toLowerCase();
  if (!guess) return;

  const msg = document.getElementById('message');

  if (guess === current.a.toLowerCase()) {
    msg.textContent = "Correct! Well done, you cracked it!";
    msg.className = 'msg-right';
    endGame(true);
    return;
  }

  triesLeft--;
  buildDots();
  input.value = '';

  if (triesLeft === 0) {
    msg.textContent = "Out of tries! The answer is revealed below.";
    msg.className = 'msg-reveal';
    endGame(false);
    return;
  }

  const phrases = [
    "Not quite — try again!",
    "Hmm, not that. " + triesLeft + " " + (triesLeft === 1 ? "try" : "tries") + " left.",
    "Nope! Think harder. " + triesLeft + " " + (triesLeft === 1 ? "try" : "tries") + " left.",
    "Still wrong! " + triesLeft + " " + (triesLeft === 1 ? "try" : "tries") + " remaining."
  ];
  msg.textContent = phrases[Math.min(5 - triesLeft - 1, phrases.length - 1)];
  msg.className = 'msg-wrong';

  const inputEl = document.getElementById('input-row');
  inputEl.classList.remove('shake');
  void inputEl.offsetWidth;
  inputEl.classList.add('shake');

  input.focus();
}

function showHint() {
  if (hintUsed || gameOver) return;
  hintUsed = true;
  document.getElementById('hint-label').textContent = "Hint: " + current.hint;
  document.getElementById('hint-btn').style.display = 'none';
}

function endGame(won) {
  gameOver = true;
  document.getElementById('input-row').style.display = 'none';
  document.getElementById('hint-btn').style.display = 'none';

  if (!won) {
    const reveal = document.getElementById('reveal-box');
    reveal.textContent = "The answer was: " + current.a.charAt(0).toUpperCase() + current.a.slice(1);
    reveal.classList.add('visible');
  }
}

document.getElementById('answer-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkAnswer();
});
</script>
</body>
</html>
